<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Kijivu</title>
  <script>
    // GitHub Pages SPA redirect
    // When GitHub Pages returns a 404, this page redirects to index.html
    // while preserving the original URL path so React Router can handle it.
    // Based on: https://github.com/rafgraph/spa-github-pages
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
      l.pathname.slice(1).split('/').join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
